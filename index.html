<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pneumatik Lengkap - SMK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 280px;
            --primary: #2563eb;
            --dark: #0f172a;
            --light-bg: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: #1e293b;
            display: flex;
            overflow-x: hidden;
        }

        /* SIDEBAR STYLES */
        aside {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--dark);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 25px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px 10px;
            scrollbar-width: thin;
            scrollbar-color: #334155 transparent;
        }

        .nav-container::-webkit-scrollbar {
            width: 5px;
        }

        .nav-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .nav-section {
            margin-bottom: 20px;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #475569;
            padding-left: 10px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .nav-item {
            display: block;
            padding: 10px 12px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        /* MAIN CONTENT */
        main {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 80px;
        }

        .slide {
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            scroll-margin-top: 40px;
            border: 1px solid #e2e8f0;
        }

        .slide-number {
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .slide-title {
            font-size: 2.2rem;
            color: var(--dark);
            margin-bottom: 30px;
            border-bottom: 4px solid var(--primary);
            display: inline-block;
            padding-bottom: 10px;
        }

        .slide-content {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #334155;
        }

        .card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border-left: 5px solid var(--primary);
        }

        ul, ol {
            padding-left: 25px;
            margin: 15px 0;
        }

        li {
            margin-bottom: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            aside { width: 70px; }
            .nav-item span, .nav-section-title, .sidebar-header h2 span { display: none; }
            main { margin-left: 70px; padding: 20px; }
            .slide { padding: 30px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-wind"></i> <span>Pneumatik</span></h2>
        </div>
        <div class="nav-container" id="navContainer">
            <!-- Navigasi akan diisi oleh JavaScript untuk memastikan semua 30 muncul -->
        </div>
    </aside>

    <main id="mainContent">
        <!-- Slide 1-30 akan diisi oleh JavaScript -->
    </main>

    <script>
        const materi = [
            { id: 1, group: "Pendahuluan", title: "Judul Utama & Pengantar", desc: "Selamat datang di modul pembelajaran Sistem Pneumatik Industri." },
            { id: 2, group: "Pendahuluan", title: "Tujuan Pembelajaran", desc: "Memahami prinsip dasar, komponen, dan perancangan sistem kontrol udara bertekanan." },
            { id: 3, group: "Dasar Teori", title: "Etimologi Pneumatik", desc: "Berasal dari bahasa Yunani 'Pneuma' yang berarti napas atau udara." },
            { id: 4, group: "Dasar Teori", title: "Definisi Teknik", desc: "Ilmu yang mempelajari gerakan dan perpindahan udara bertekanan untuk menghasilkan tenaga." },
            { id: 5, group: "Fisika Udara", title: "Sifat-Sifat Udara", desc: "1. Mudah dimampatkan. 2. Dapat mengalir. 3. Volume tidak tetap. 4. Tidak berwarna." },
            { id: 6, group: "Fisika Udara", title: "Hukum Boyle-Mariotte", desc: "Volume gas berbanding terbalik dengan tekanan pada suhu konstan (P1.V1 = P2.V2)." },
            { id: 7, group: "Fisika Udara", title: "Hukum Gay-Lussac", desc: "Hubungan antara tekanan dan suhu pada volume yang tetap." },
            { id: 8, group: "Analisis", title: "Kelebihan Pneumatik", desc: "Ketersediaan melimpah, tahan ledakan, bersih, dan kecepatan kerja tinggi." },
            { id: 9, group: "Analisis", title: "Kekurangan Pneumatik", desc: "Kebisingan tinggi, gaya terbatas, dan memerlukan pelumasan serta pengolahan udara." },
            { id: 10, group: "Hirarki", title: "Struktur Sistem Kontrol", desc: "Memahami 5 tingkatan dalam diagram alir pneumatik (Catu daya - Masukan - Pemroses - Kontrol - Aktuator)." },
            { id: 11, group: "Hirarki", title: "Level 1: Catu Daya", desc: "Kompresor, tangki udara, dan pengering udara (Air Dryer)." },
            { id: 12, group: "Hirarki", title: "Level 2: Elemen Masukan", desc: "Tombol tekan (Push button), sakelar batas (Limit switch), dan sensor." },
            { id: 13, group: "Hirarki", title: "Level 3: Pemroses Sinyal", desc: "Katup logika seperti AND, OR, dan NOT untuk menentukan alur kerja." },
            { id: 14, group: "Hirarki", title: "Level 4: Elemen Kontrol Akhir", desc: "Katup Kontrol Arah (KKA) yang langsung menggerakkan aktuator." },
            { id: 15, group: "Hirarki", title: "Level 5: Aktuator", desc: "Silinder kerja tunggal, silinder kerja ganda, dan motor pneumatik." },
            { id: 16, group: "Besaran", title: "Satuan Tekanan", desc: "Mengenal Bar, PSI, Pascal (Pa), dan Atmfer (Atm)." },
            { id: 17, group: "Besaran", title: "Konversi Satuan", desc: "1 Bar ≈ 14.5 PSI ≈ 100.000 Pascal." },
            { id: 18, group: "Besaran", title: "Tekanan Atmosfer vs Efektif", desc: "Membedakan tekanan absolut dan tekanan yang terbaca pada manometer." },
            { id: 19, group: "Komponen", title: "Kompresor Udara", desc: "Jenis Piston, Screw, dan Centrifugal untuk memampatkan udara." },
            { id: 20, group: "Komponen", title: "Tangki Udara (Reservoir)", desc: "Menyimpan cadangan udara dan menstabilkan tekanan sistem." },
            { id: 21, group: "Pengolahan", title: "Unit FRL", desc: "Filter (Penyaring), Regulator (Pengatur), dan Lubricator (Pelumas)." },
            { id: 22, group: "Katup", title: "Jenis-Jenis KKA", desc: "Katup 3/2, 5/2, dan 5/3 berdasarkan lubang dan posisi." },
            { id: 23, group: "Katup", title: "Simbol ISO 1219", desc: "Membaca garis, panah, dan blok kotak dalam simbol pneumatik standar internasional." },
            { id: 24, group: "Aktuator", title: "Single Acting Cylinder", desc: "Silinder yang kembali ke posisi semula menggunakan pegas internal." },
            { id: 25, group: "Aktuator", title: "Double Acting Cylinder", desc: "Silinder yang maju dan mundur sepenuhnya menggunakan udara bertekanan." },
            { id: 26, group: "Logika", title: "Katup Dua Tekanan (AND)", desc: "Udara hanya mengalir jika kedua input mendapatkan sinyal secara bersamaan." },
            { id: 27, group: "Logika", title: "Katup Ganti (OR)", desc: "Udara mengalir jika salah satu atau kedua input mendapatkan sinyal." },
            { id: 28, group: "Aplikasi", title: "Otomasi Industri", desc: "Penggunaan pada mesin packaging, perakitan otomotif, dan industri makanan." },
            { id: 29, group: "K3", title: "Keselamatan Kerja", desc: "Menggunakan kacamata pelindung, periksa kebocoran, dan jangan arahkan udara ke kulit." },
            { id: 30, group: "Penutup", title: "Kesimpulan & Evaluasi", desc: "Rangkuman seluruh materi dan sesi tanya jawab interaktif." }
        ];

        const navContainer = document.getElementById('navContainer');
        const mainContent = document.getElementById('mainContent');

        let currentGroup = "";

        materi.forEach(item => {
            // Create Navigation Group Title
            if (item.group !== currentGroup) {
                currentGroup = item.group;
                const groupTitle = document.createElement('div');
                groupTitle.className = 'nav-section-title';
                groupTitle.innerText = currentGroup;
                navContainer.appendChild(groupTitle);
            }

            // Create Nav Item
            const navLink = document.createElement('a');
            navLink.href = `#slide-${item.id}`;
            navLink.className = 'nav-item';
            navLink.id = `nav-link-${item.id}`;
            navLink.innerHTML = `<span>${item.id < 10 ? '0'+item.id : item.id}. ${item.title}</span>`;
            navContainer.appendChild(navLink);

            // Create Slide Content
            const slideSection = document.createElement('section');
            slideSection.className = 'slide';
            slideSection.id = `slide-${item.id}`;
            slideSection.innerHTML = `
                <div class="slide-number">Slide ${item.id} / 30</div>
                <h1 class="slide-title">${item.title}</h1>
                <div class="slide-content">
                    <p>${item.desc}</p>
                    <div class="card">
                        <strong>Topik Utama:</strong><br>
                        Materi mendalam mengenai ${item.group} bagian ${item.title.toLowerCase()}.
                    </div>
                    <div class="grid-2">
                        <div>
                            <h4>Poin Penting:</h4>
                            <ul>
                                <li>Parameter Teknik Standar</li>
                                <li>Implementasi Industri</li>
                                <li>Kesesuaian ISO</li>
                            </ul>
                        </div>
                        <div>
                            <h4>Visualisasi:</h4>
                            <div style="background:#e2e8f0; height:100px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#64748b; font-size:0.8rem;">
                                [Ilustrasi ${item.title}]
                            </div>
                        </div>
                    </div>
                </div>
            `;
            mainContent.appendChild(slideSection);
        });

        // Scroll Spy Logic
        window.addEventListener('scroll', () => {
            let current = "";
            const slides = document.querySelectorAll('.slide');
            slides.forEach(slide => {
                const slideTop = slide.offsetTop;
                if (pageYOffset >= slideTop - 100) {
                    current = slide.getAttribute('id').split('-')[1];
                }
            });

            document.querySelectorAll('.nav-item').forEach(li => {
                li.classList.remove('active');
                if (li.id === `nav-link-${current}`) {
                    li.classList.add('active');
                    // Auto scroll sidebar to active item
                    li.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        });

        // Click transition
        document.querySelectorAll('.nav-item').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
